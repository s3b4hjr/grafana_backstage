# =============================================================================
# Environment-agnostic observability stack (LGTM + Prometheus)
#
#   Grafana ........ dashboards & exploration            :3000
#   Prometheus ..... metrics store + alert rules         :9090
#   Alertmanager ... alert routing / silencing           :9093
#   Loki ........... log aggregation                     :3100
#   Tempo .......... distributed tracing                 :3200
#   Alloy .......... unified agent (logs + OTLP gateway)  :12345  OTLP :4317/:4318
#   node-exporter .. host metrics                         :9100
#   cAdvisor ....... container metrics                    :8080
#   blackbox ....... endpoint probing (profile: probes)   :9115
#
# Every tunable lives in .env — nothing host-specific is hard-coded here.
# Optional services are gated behind compose profiles (see `probes`).
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart unless-stopped

networks:
  observability:
    name: observability

volumes:
  grafana-data:
  prometheus-data:
  alertmanager-data:
  loki-data:
  tempo-data:
  alloy-data:

services:
  # --------------------------------------------------------------------- UI --
  grafana:
    image: ${GRAFANA_VERSION}
    container_name: grafana
    restart: *default-restart
    logging: *default-logging
    networks: [observability]
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-}
      GF_LOG_LEVEL: ${GRAFANA_LOG_LEVEL}
      GF_INSTALL_PLUGINS: ${GRAFANA_INSTALL_PLUGINS:-}
      # Grafana 13 tries to auto-install bundled-external plugins (e.g. elasticsearch)
      # we don't use; disable to keep logs clean.
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_USERS_DEFAULT_THEME: dark
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceqlStreaming metricsSummary
      GF_DIAGNOSTICS_PROFILING_ENABLED: "false"
      # SMTP for email alert notifications (optional — set in .env to enable).
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${GF_SMTP_HOST:-}
      GF_SMTP_USER: ${GF_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM_ADDRESS:-grafana@grafana.localhost}
      GF_SMTP_FROM_NAME: ${GF_SMTP_FROM_NAME:-Grafana Alerts}
      TZ: ${TZ}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus: { condition: service_started }
      loki: { condition: service_started }
      tempo: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------- Metrics --
  prometheus:
    image: ${PROMETHEUS_VERSION}
    container_name: prometheus
    restart: *default-restart
    logging: *default-logging
    networks: [observability]
    ports:
      - "${PROMETHEUS_PORT}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME}"
      - "--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE}"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage,native-histograms"
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Optional: classic Prometheus-native routing. Grafana's built-in alerting is
  # the default (no Alertmanager needed). Enable with:
  #   docker compose --profile classic-alerting up -d
  alertmanager:
    image: ${ALERTMANAGER_VERSION}
    container_name: alertmanager
    restart: *default-restart
    logging: *default-logging
    networks: [observability]
    profiles: ["classic-alerting"]
    ports:
      - "${ALERTMANAGER_PORT}:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./config/alertmanager:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ------------------------------------------------------------------- Logs --
  loki:
    image: ${LOKI_VERSION}
    container_name: loki
    restart: *default-restart
    logging: *default-logging
    networks: [observability]
    ports:
      - "${LOKI_PORT}:3100"
    command:
      - "-config.file=/etc/loki/loki-config.yml"
      - "-config.expand-env=true"
    environment:
      LOKI_RETENTION_PERIOD: ${LOKI_RETENTION_PERIOD}
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    # The distroless loki image ships no shell/wget, so no container healthcheck.
    # Liveness is observable via Prometheus (job "loki") and Grafana's datasource health.

  # ----------------------------------------------------------------- Traces --
  tempo:
    image: ${TEMPO_VERSION}
    container_name: tempo
    restart: *default-restart
    logging: *default-logging
    networks: [observability]
    ports:
      - "${TEMPO_PORT}:3200"          # Tempo HTTP / query API
    command:
      - "-config.file=/etc/tempo/tempo.yml"
      - "-config.expand-env=true"
    environment:
      TEMPO_RETENTION: ${TEMPO_RETENTION}
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    depends_on:
      prometheus: { condition: service_started }
    # The distroless tempo image ships no shell/wget, so no container healthcheck.
    # Liveness is observable via Prometheus (job "tempo") and Grafana's datasource health.

  # ----------------------------------------------- Unified agent / OTLP in ---
  # Tails Docker container logs -> Loki, and acts as the OTLP gateway -> Tempo.
  alloy:
    image: ${ALLOY_VERSION}
    container_name: alloy
    restart: *default-restart
    logging: *default-logging
    networks: [observability]
    ports:
      - "${ALLOY_PORT}:12345"         # Alloy UI / metrics
      - "${OTLP_GRPC_PORT}:4317"      # OTLP gRPC ingest
      - "${OTLP_HTTP_PORT}:4318"      # OTLP HTTP ingest
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      loki: { condition: service_started }
      tempo: { condition: service_started }

  # --------------------------------------------------------------- Exporters --
  node-exporter:
    image: ${NODE_EXPORTER_VERSION}
    container_name: node-exporter
    restart: *default-restart
    logging: *default-logging
    networks: [observability]
    ports:
      - "${NODE_EXPORTER_PORT}:9100"
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    pid: host

  cadvisor:
    image: ${CADVISOR_VERSION}
    container_name: cadvisor
    restart: *default-restart
    logging: *default-logging
    networks: [observability]
    ports:
      - "${CADVISOR_PORT}:8080"
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  # ------------------------------------------ Optional: endpoint probing -----
  # Enable with: docker compose --profile probes up -d
  blackbox-exporter:
    image: ${BLACKBOX_VERSION}
    container_name: blackbox-exporter
    restart: *default-restart
    logging: *default-logging
    networks: [observability]
    profiles: ["probes"]
    ports:
      - "${BLACKBOX_PORT}:9115"
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    volumes:
      - ./config/blackbox:/etc/blackbox:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
