# Prometheus scrape & alerting config.
# Static targets use the compose service names on the `observability` network.
# To scrape apps on the Docker host, uncomment the `host-apps` job below.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: observability-stack

# Alerting is handled by Grafana's built-in alerting by default (easier — manage
# rules & notifications in the Grafana UI; see config/grafana/provisioning/alerting/).
# To use the CLASSIC Prometheus + external Alertmanager path instead, start it with
#   docker compose --profile classic-alerting up -d
# and uncomment the two blocks below (the rules live in config/prometheus/rules/).
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]
#
# rule_files:
#   - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  # alertmanager runs only under the classic-alerting profile — uncomment then.
  # - job_name: alertmanager
  #   static_configs:
  #     - targets: ["alertmanager:9093"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]

  # ---- Endpoint probing via blackbox-exporter (profile: probes) ------------
  # blackbox-exporter only runs with `--profile probes`. Uncomment this job AND
  # start that profile; add the URLs you want to monitor under `targets`.
  # - job_name: blackbox-http
  #   metrics_path: /probe
  #   params:
  #     module: [http_2xx]
  #   static_configs:
  #     - targets:
  #         - https://grafana.com
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: __param_target
  #     - source_labels: [__param_target]
  #       target_label: instance
  #     - target_label: __address__
  #       replacement: blackbox-exporter:9115

  # ---- YOUR APPLICATIONS (simple onboarding) -------------------------------
  # Don't edit this file to add an app. Instead drop a target into
  # config/prometheus/targets/*.yml — Prometheus reloads it automatically
  # (refresh_interval below), no restart and no `make reload-prometheus` needed.
  # Use `host.docker.internal:<port>` for apps on the Docker host, or the
  # container/service name for anything on the `observability` network.
  - job_name: applications
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/*.yml
        refresh_interval: 30s
