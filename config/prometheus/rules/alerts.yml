# Baseline alert rules — generic and environment-agnostic.
# Tune thresholds per environment; wire delivery in config/alertmanager/alertmanager.yml.

groups:
  - name: instance-health
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Target down: {{ $labels.job }}"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been unreachable for 2m."

      - alert: PrometheusConfigReloadFailed
        expr: prometheus_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus config reload failed"
          description: "Reloading Prometheus configuration has failed on {{ $labels.instance }}."

  - name: host-resources
    rules:
      - alert: HostHighCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU load on {{ $labels.instance }}"
          description: "CPU usage is above 85% for 10m (current: {{ printf \"%.0f\" $value }}%)."

      - alert: HostHighMemoryUsage
        expr: 100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90% for 10m (current: {{ printf \"%.0f\" $value }}%)."

      - alert: HostLowDiskSpace
        expr: 100 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"} * 100) > 85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Filesystem usage is above 85% for 15m (current: {{ printf \"%.0f\" $value }}%)."

  - name: containers
    rules:
      - alert: ContainerHighMemory
        expr: (container_memory_working_set_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""} * 100) > 90 and container_spec_memory_limit_bytes{name!=""} > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container near memory limit: {{ $labels.name }}"
          description: "{{ $labels.name }} is using more than 90% of its memory limit for 10m."

      - alert: ContainerKilledFrequently
        expr: changes(container_last_seen{name!=""}[1h]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container restarting frequently: {{ $labels.name }}"
          description: "{{ $labels.name }} has appeared/disappeared more than 5 times in the last hour."
