# Tempo — monolithic, filesystem-backed.
# Receives OTLP from Alloy (and may receive directly). The metrics-generator
# turns spans into RED metrics + service-graph data and remote-writes them to
# Prometheus, powering Grafana's Service Graph & span metrics.
# Env vars expanded via `-config.expand-env=true`; swap `storage.trace.backend`
# to s3/gcs/azure to scale out.

stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: ${TEMPO_RETENTION}

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]

usage_report:
  reporting_enabled: false
