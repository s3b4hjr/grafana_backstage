# Alertmanager routing. The default receiver is a no-op so the stack boots
# cleanly out of the box — wire in a real receiver per environment.
# Tip: keep secrets (Slack/webhook URLs) out of git; inject via env/templated file.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: default
      continue: true

receivers:
  - name: default
    # --- Examples (uncomment & configure one) ---
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
    #     channel: "#alerts"
    #     send_resolved: true
    # webhook_configs:
    #   - url: "http://your-webhook:9000/alert"
    #     send_resolved: true

inhibit_rules:
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "warning"]
    equal: ["alertname", "job", "instance"]
